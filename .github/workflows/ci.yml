name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint all workspaces
        run: npm run lint --workspaces
        continue-on-error: true

  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voyr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Block database credentials in test sources
        run: |
          if rg -q 'db\.[a-z0-9]{15,}\.supabase\.co' backend --glob '*.test.ts' --glob '*.spec.ts'; then
            echo 'ERROR: Real Supabase project hostnames must not appear in test files. Use short fake refs like testprojectref.'
            exit 1
          fi
          if rg -P --glob '*.test.ts' --glob '*.spec.ts' 'postgresql://postgres:(?!test-password-placeholder|postgres|pass)[^@/]{3,}@db\.' backend; then
            echo 'ERROR: Database connection strings with real passwords must not appear in test files.'
            exit 1
          fi

      - name: Run migrations
        run: npx node-pg-migrate up --migrations-dir src/db/migrations --migration-file-language ts --tsx
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyr_test

      - name: Seed travel visa data
        run: npx tsx src/db/run-seed.ts
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyr_test

      - name: Build shared package
        run: npm run build --workspace=@voyr/shared

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Run tests
        run: npx vitest run --config vitest.config.ts
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyr_test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Build
        run: npm run build --workspace=frontend

  gateway:
    name: Gateway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: gateway

      - name: Run tests
        run: npx vitest run --config vitest.config.ts
        working-directory: gateway

  deploy:
    name: Deploy
    needs: [lint, backend, frontend, gateway]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Set Gateway Worker secrets
        run: echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
        working-directory: gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Gateway Worker
        run: npx wrangler deploy
        working-directory: gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build frontend (static export)
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://voyr-travel-ops.aryansaxenaalig.workers.dev' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://voyr-frontend.pages.dev' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Deploy Frontend to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name voyr-frontend --branch main
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
